{% extends "base.html" %} {% load static %} 
{% block title %}Pay with eSewa{% endblock %} {% block extra_css %}
<style>
  .payment-gateway-page {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    flex-direction: column;
    gap: 1.5rem;
    text-align: center;
    padding: 2rem;
  }
  .payment-gateway-page img {
    width: 180px;
    margin-bottom: 1rem;
  }
  .spinner {
    width: 48px;
    height: 48px;
    border: 5px solid #e8e8e8;
    border-top-color: #60bb46;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }
  .gateway-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: #333;
  }
  .gateway-sub {
    color: #666;
    font-size: 0.95rem;
  }
</style>
{% endblock %} {% block content %}
<div class="payment-gateway-page">
  <div class="gateway-title">Redirecting to eSewa…</div>
  <div class="spinner"></div>
  <p class="gateway-sub">
    Please wait while we redirect you to eSewa sandbox. Do not refresh this
    page.
  </p>
</div>

<!-- eSewa v2 Auto-Submit Form -->
<form
  id="esewa-form"
  action="{{ esewa_url }}"
  method="POST"
  style="display: none"
>
  <input type="hidden" name="amount" value="{{ amount }}" />
  <input type="hidden" name="tax_amount" value="{{ tax_amount }}" />
  <input type="hidden" name="total_amount" value="{{ total_amount }}" />
  <input type="hidden" name="transaction_uuid" value="{{ transaction_uuid }}" />
  <input type="hidden" name="product_code" value="{{ product_code }}" />
  <input
    type="hidden"
    name="product_service_charge"
    value="{{ product_service_charge }}"
  />
  <input
    type="hidden"
    name="product_delivery_charge"
    value="{{ product_delivery_charge }}"
  />
  <input type="hidden" name="success_url" value="{{ success_url }}" />
  <input type="hidden" name="failure_url" value="{{ failure_url }}" />
  <input
    type="hidden"
    name="signed_field_names"
    value="{{ signed_field_names }}"
  />
  <input type="hidden" name="signature" value="{{ signature }}" />
</form>
{% endblock %} {% block extra_js %}
<script>
  document.addEventListener("DOMContentLoaded", function () {
    setTimeout(function () {
      document.getElementById("esewa-form").submit();
    }, 800);
  });
</script>
{% endblock %}
